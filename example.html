<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Linda Newnham</title>

<meta property="og:type" content="website" />
<meta property="og:title" content="Linda Newnham" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #faf8f5;
    --paper: #ffffff;
    --ink: #1b1815;
    --ink-2: #2f2b25;
    --ink-3: #635d55;
    --ink-4: #9a9488;
    --rule: #e5dfd5;
    --cream: #f1ebe0;
    --sand: #e6dcc8;
    --accent: #6b2936;
    --pop: #c8a96e;
    --serif: 'EB Garamond', Georgia, serif;
  }

  html { scroll-behavior: smooth; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--serif);
    font-size: 18px;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: #fff; }

  /* ====== TOPBAR ====== */
  .topbar {
    position: sticky; top: 0; z-index: 40;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--rule);
  }
  .topbar-inner {
    max-width: 1320px; margin: 0 auto;
    padding: 14px 32px;
    display: flex; align-items: center; gap: 28px;
  }
  .brand {
    font-size: 15px; font-weight: 500; letter-spacing: 0.01em;
    display: flex; align-items: center; gap: 10px;
  }
  .brand-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }

  /* ====== BACK PILL BUTTON ====== */
  .btn-back {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--serif); font-size: 11px; font-weight: 500;
    font-style: normal; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 10px 22px 10px 18px; border-radius: 999px;
    border: 1px solid var(--rule);
    background: var(--paper); color: var(--ink-4);
    transition: background .15s, color .15s, border-color .15s;
  }
  .btn-back:hover { background: var(--cream); color: var(--ink); border-color: var(--ink-4); }
  .btn-back svg { width: 14px; height: 14px; flex-shrink: 0; transition: transform .15s; }
  .btn-back:hover svg { transform: translateX(-2px); }

  .page { max-width: 1320px; margin: 0 auto; padding: 0 32px; }

  /* ====== EXAMPLE HEADER ====== */
  .example-header {
    padding: 72px 0 56px;
    display: grid; grid-template-columns: 180px 1fr; gap: 40px;
    border-bottom: 1px solid var(--rule);
  }
  .example-eyebrow {
    font-size: 11px; font-weight: 500;
    color: var(--ink-4); letter-spacing: 0.18em;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 10px;
    padding-top: 12px;
  }
  .example-header-body h1 {
    font-size: clamp(36px, 5vw, 72px);
    font-weight: 400; line-height: 0.95;
    letter-spacing: -0.02em; margin: 0 0 20px;
  }
  .example-meta {
    font-size: 14px; font-weight: 500;
    color: var(--ink-4); letter-spacing: 0.12em;
    text-transform: uppercase; margin: 0 0 28px;
  }
  .example-desc {
    font-size: 18px; line-height: 1.65; color: var(--ink-2);
    max-width: 640px; margin: 0;
  }
  .example-desc em { font-style: italic; color: var(--ink); }

  /* ====== DOCUMENT VIEW ====== */
  .document-section {
    padding: 56px 0;
    border-bottom: 1px solid var(--rule);
  }

  /* Full-width JPG */
  .document-image {
    width: 100%;
    display: block;
    border: 1px solid var(--rule);
    border-radius: 2px;
  }

  /* Multi-page: stack of images */
  .document-pages {
    display: flex; flex-direction: column; gap: 4px;
  }
  .document-pages img {
    width: 100%; display: block;
    border: 1px solid var(--rule);
  }
  .document-pages img:first-child { border-radius: 2px 2px 0 0; }
  .document-pages img:last-child  { border-radius: 0 0 2px 2px; }

  /* Embedded PDF */
  .document-pdf {
    width: 100%;
    height: 90vh; min-height: 600px;
    border: 1px solid var(--rule);
    border-radius: 2px;
    display: block;
  }

  /* ====== NAV ====== */
  .section-nav { padding: 28px 0; }

  /* ====== FOOTER ====== */
  footer {
    background: var(--ink); color: var(--bg);
  }
  .footer-inner {
    max-width: 1320px; margin: 0 auto; padding: 64px 32px 40px;
  }
  .footer-meta {
    display: flex; justify-content: space-between;
    font-size: 11px; color: rgba(255,255,255,.3);
    letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500;
  }

  /* ====== RESPONSIVE ====== */
  @media (max-width: 960px) {
    .topbar-inner { padding: 14px 20px; }
    .example-header { grid-template-columns: 1fr; gap: 16px; }
    .example-eyebrow { padding-top: 0; }
  }
  @media (max-width: 600px) {
    .topbar-inner { padding: 12px 16px; }
    .page { padding: 0 20px; }
    .example-header { padding: 48px 0 40px; }
    .document-section { padding: 40px 0; }
    .footer-inner { padding: 48px 20px 32px; }
  }
</style>
</head>
<body>

<!-- ====== TOPBAR ====== -->
<header class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand">
      <span class="brand-dot"></span>
      Linda Newnham
    </a>
  </div>
</header>

<!-- ====== TOP BACK BUTTON ====== -->
<div class="page">
  <div class="section-nav">
    <a href="index.html" class="btn-back" id="back-top">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
      <span id="back-label-top">Tillbaka</span>
    </a>
  </div>
</div>

<!-- ====== EXAMPLE HEADER ====== -->
<div class="page">
  <div class="example-header">
    <div class="example-eyebrow" id="eyebrow"></div>
    <div class="example-header-body">
      <h1 id="headline"></h1>
      <p class="example-desc" id="intro"></p>
    </div>
  </div>
</div>

<!-- ====== DOCUMENT ====== -->
<div class="page">
  <div class="document-section" id="document-section">
    <div id="document-placeholder" style="
      aspect-ratio: 3/4;
      background: var(--sand);
      border: 1px solid var(--rule);
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-4); font-style: italic; font-size: 16px;
    ">
      Dokument läggs in här
    </div>
  </div>
</div>

<!-- ====== BOTTOM BACK BUTTON ====== -->
<div class="page">
  <div class="section-nav">
    <a href="index.html" class="btn-back" id="back-bottom">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
      <span id="back-label-bottom">Tillbaka</span>
    </a>
  </div>
</div>

<!-- ====== FOOTER ====== -->
<footer>
  <div class="footer-inner">
    <div class="footer-meta">
      <span>Linda Newnham</span>
      <span>© 2026</span>
    </div>
  </div>
</footer>

<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id) return;

  let data;
  try {
    const res = await fetch('/api/data');
    if (!res.ok) throw new Error();
    data = await res.json();
  } catch {
    return;
  }

  const cats = { journalist: 'Journalist', forfattare: 'Författare', redaktor: 'Redaktör' };
  const catParam = params.get('cat');
  let ex, catKey, catLabel;
  if (catParam && cats[catParam]) {
    ex = (data[catParam]?.examples || []).find(e => e.id === id);
    if (ex) { catKey = catParam; catLabel = cats[catParam]; }
  }
  if (!ex) {
    for (const [key, label] of Object.entries(cats)) {
      ex = (data[key]?.examples || []).find(e => e.id === id);
      if (ex) { catKey = key; catLabel = label; break; }
    }
  }
  if (!ex) return;

  const backHref = `index.html#${catKey}`;
  document.getElementById('back-top').href = backHref;
  document.getElementById('back-bottom').href = backHref;
  document.getElementById('back-label-top').textContent = catLabel;
  document.getElementById('back-label-bottom').textContent = catLabel;

  document.getElementById('eyebrow').textContent = catLabel;
  document.getElementById('headline').textContent = ex.subpage?.headline || ex.title || '';
  document.getElementById('intro').textContent = ex.subpage?.intro || '';
  document.title = `${ex.subpage?.headline || ex.title || 'Linda Newnham'} — Linda Newnham`;

  const section = document.getElementById('document-section');
  const placeholder = document.getElementById('document-placeholder');
  const doc = ex.subpage?.document;
  if (doc) {
    placeholder.remove();
    if (ex.subpage.documentType === 'pdf') {
      const embed = document.createElement('embed');
      embed.src = doc;
      embed.type = 'application/pdf';
      embed.className = 'document-pdf';
      section.appendChild(embed);
    } else {
      const img = document.createElement('img');
      img.src = doc;
      img.alt = ex.subpage?.headline || '';
      img.className = 'document-image';
      section.appendChild(img);
    }
  }
})();
</script>

</body>
</html>
